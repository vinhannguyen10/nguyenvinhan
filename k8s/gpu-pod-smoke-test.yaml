apiVersion: v1
kind: Pod
metadata:
  name: hpcq-gpu-smoke-test
  labels:
    app: hpcq-smoke
spec:
  restartPolicy: Never
  containers:
    - name: cuda
      image: nvidia/cuda:12.4.1-base-ubuntu22.04
      command: ["bash", "-lc", "nvidia-smi && sleep 5"]
      resources:
        limits:
          nvidia.com/gpu: 1
